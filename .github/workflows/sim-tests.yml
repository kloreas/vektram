name: Sim Tests

on:
  push:
    paths:
      - 'sim/**'
      - '.github/workflows/sim-tests.yml'
  pull_request:
    paths:
      - 'sim/**'
      - '.github/workflows/sim-tests.yml'

jobs:
  test:
    name: dotnet test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore sim/Sim.sln

      - name: Build
        run: dotnet build sim/Sim.sln --no-restore -c Release

      - name: Test
        run: >
          dotnet test sim/Sim.sln
          --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-test-results
          path: '**/TestResults/*.trx'
